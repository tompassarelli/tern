name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Checkout North
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          path: north

      # Resolve the exact source inputs used by North's Nix packages, CI, and
      # Docker image. There are no second hand-maintained source pointers.
      - name: Resolve locked source inputs
        id: sources
        run: |
          {
            echo "fram_repository=$(north/bin/github-flake-input-pin north/flake.lock fram repository)"
            echo "fram_ref=$(north/bin/github-flake-input-pin north/flake.lock fram revision)"
            echo "gaffer_repository=$(north/bin/github-flake-input-pin north/flake.lock gaffer repository)"
            echo "gaffer_ref=$(north/bin/github-flake-input-pin north/flake.lock gaffer revision)"
          } >> "$GITHUB_OUTPUT"
      - name: Checkout Fram engine (pinned)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          repository: ${{ steps.sources.outputs.fram_repository }}
          ref: ${{ steps.sources.outputs.fram_ref }}
          path: fram

      - name: Install babashka
        run: |
          set -euo pipefail
          asset=babashka-1.12.218-linux-amd64-static.tar.gz
          curl -fL --retry 5 -o "$asset" \
            "https://github.com/babashka/babashka/releases/download/v1.12.218/$asset"
          echo "7bd028cc794732ffde3da31ce4379840893c8e54f1046f92a8dfc4f4b3cddaf8  $asset" \
            | sha256sum -c -
          sudo tar -xzf "$asset" -C /usr/local/bin bb
          test "$(bb --version)" = "babashka v1.12.218"
          rm -f "$asset"

      # Fram's coordinator daemon (bin/fram-daemon) runs on the JVM via `clojure -M`,
      # NOT babashka — bb's native image lacks javax.net.ssl.SSLServerSocket (engine
      # mTLS). The gateway tests stand up a real coordinator, so the runner needs the
      # Clojure CLI + a JDK (ubuntu-latest ships a JDK; rlwrap isn't needed for `clojure`).
      - name: Install Clojure CLI (Fram's coordinator daemon is JVM, not bb)
        run: |
          set -euo pipefail
          curl -fL --retry 5 -o clojure-install.sh \
            https://github.com/clojure/brew-install/releases/download/1.12.5.1654/linux-install.sh
          echo "28f81b0833c0a072f4370ae0eb1e4c5a4f9f4a34035cd7607ea9f253a8b06da1  clojure-install.sh" \
            | sha256sum -c -
          sudo bash clojure-install.sh
          clojure -Sdescribe | grep -F '"1.12.5.1654"'
          rm -f clojure-install.sh

      # Pre-download Fram's JVM deps (cheshire) so the daemon boots within the test
      # poll window instead of racing a cold Maven fetch on first launch.
      - name: Warm Fram JVM deps
        working-directory: fram
        run: clojure -P

      - name: Shell source validation
        working-directory: north
        run: |
          set -euo pipefail
          mapfile -d '' candidates < <(find bin cli/tests deploy/gateway -type f -print0)
          scripts=()
          for file in "${candidates[@]}"; do
            IFS= read -r first < "$file" || true
            case "$first" in
              '#!'*bash*|'#!'*'/sh'|'#!'*' env sh') scripts+=("$file") ;;
            esac
          done
          ((${#scripts[@]} > 0))
          shellcheck "${scripts[@]}"

      - name: Lock and packaged-helper boundaries
        working-directory: north
        run: |
          set -euo pipefail
          bash bin/tests/github-flake-input-pin-test.sh
          bash bin/tests/package-purity-check-test.sh
          bash bin/tests/ci-required-bars-test.sh
          bash bin/tests/sdk-test-entrypoint-test.sh
          bash cli/tests/package-helper-smoke-test.sh
          bash bin/tests/north-on-stop-test.sh

      - name: Docker context and runtime closure
        working-directory: north
        run: CONTAINER_ENGINE=docker bash bin/tests/docker-context-test.sh

      - name: Domain tests (run on the committed out/, no Beagle build needed)
        working-directory: north
        run: |
          set -euo pipefail
          CP="out:../fram/out"
          bb -cp "$CP" clock_test.clj
          bb -cp "$CP" cli/tests/coordinator-diagnostic-test.clj
          bb -cp "$CP" staleness_test.clj
          bb reap_test.clj      # reactor reap verdict (daemon-free; guards the @run-join false positive)
          bb cli/tests/reactor-heartbeat-test.clj   # durable last-sweep heartbeat + doctor stale/missing verdict (daemon-free)
          bb cli/tests/worktree-janitor-integration-test.clj  # real Git + isolated coordinator, production sweep-once twice
          # Generate the exact imported corpus and require the lifecycle bar's
          # terminal PASS marker so a missing/wrong log can never skip green.
          ( cd ../fram && bin/fram import )
          test -s ../fram/coordination.log
          lifecycle_output="$(FRAM_LOG=../fram/coordination.log bb -cp "$CP" lifecycle_test.clj)"
          printf '%s\n' "$lifecycle_output"
          grep -Fq 'Stage 4: lifecycle-as-rules == hand-coded PASS' <<<"$lifecycle_output"

      - name: Coordinator policy and startup boundaries
        working-directory: north
        run: |
          set -euo pipefail
          bb cli/tests/concern-code-response-test.clj
          bb cli/tests/context-replacement-test.clj
          bb cli/tests/coord-wire-boundary-test.clj
          bb cli/tests/dashboard-doctor-exit-test.clj
          bb cli/tests/linear-helper-protocol-test.clj
          bash cli/tests/north-explicit-log-test.sh
          FRAM_TEST_CHECKOUT="$GITHUB_WORKSPACE/fram" \
            bash cli/tests/north-coord-up-test.sh

      - name: Coordinator strict-corpus integration
        working-directory: north
        run: |
          set -euo pipefail
          FRAM_PATH="$GITHUB_WORKSPACE/fram" \
            bash cli/tests/coord-log-fence-integration-test.sh
          FRAM_PATH="$GITHUB_WORKSPACE/fram" \
            bb cli/tests/linear-reservation-integration-test.clj

      - name: Hook, native, and managed identity boundaries
        working-directory: north
        run: |
          set -euo pipefail
          timeout --foreground 120s bash bin/tests/north-on-spawn-stress-test.sh
          timeout --foreground 120s bash bin/tests/north-on-tooluse-stress-test.sh
          timeout --foreground 120s bash bin/tests/north-mark-delegated-test.sh
          timeout --foreground 120s bash bin/tests/identity-alias-test.sh
          timeout --foreground 120s bash bin/tests/native-identity-test.sh
          FRAM_PATH="$GITHUB_WORKSPACE/fram" timeout --foreground 180s \
            bb cli/tests/agent-identity-publication-integration-test.clj
          timeout --foreground 120s bb cli/tests/spawn-process-integration-test.clj

      - name: Agent projection and routing report boundaries
        working-directory: north
        env:
          GAFFER_HOME: ${{ github.workspace }}/gaffer
        run: |
          set -euo pipefail
          timeout --foreground 120s bb cli/tests/agents-cli-test.clj
          timeout --foreground 120s bb cli/tests/map-contract-test.clj
          timeout --foreground 120s bb cli/tests/pred-cli-test.clj
          timeout --foreground 120s bb cli/tests/routing-report-test.clj

      - name: Durable coordination delivery boundaries
        working-directory: north
        env:
          FRAM_TEST_CHECKOUT: ${{ github.workspace }}/fram
        run: |
          set -euo pipefail
          timeout --foreground 180s bb cli/tests/live-feed-integration-test.clj
          timeout --foreground 180s bb cli/tests/message-audience-integration-test.clj
          timeout --foreground 180s bb cli/tests/pending-pagination-integration-test.clj
          timeout --foreground 180s bb cli/tests/peer-command-integration-test.clj

      - name: Spend-guard ledger, breaker, and reactor sweeps (real daemon)
        working-directory: north
        run: |
          set -euo pipefail
          FRAM_PATH="$GITHUB_WORKSPACE/fram" bb cli/tests/spend-cli-test.clj
          FRAM_PATH="$GITHUB_WORKSPACE/fram" bb cli/tests/spend-breaker-test.clj

      - name: Gateway policy boundaries
        working-directory: north
        run: |
          set -euo pipefail
          bb -cp out cli/tests/gateway-policy-test.clj
          GATEWAY_LIB_ONLY=1 bb -cp out cli/tests/gateway-boundary-test.clj

      - name: Gateway provision transaction boundaries
        working-directory: north
        run: bash deploy/gateway/provision_test.sh

      - name: Gateway integration smoke test
        working-directory: north
        run: FRAM_HOME="$GITHUB_WORKSPACE/fram" bash deploy/gateway/smoke_test.sh

      - name: Gateway cross-host test (FRAM_BIND=0.0.0.0 + :coordinator-host)
        working-directory: north
        run: FRAM_HOME="$GITHUB_WORKSPACE/fram" bash deploy/gateway/crosshost_test.sh

      - name: Arena strict-corpus integration
        working-directory: north
        run: FRAM_HOME="$GITHUB_WORKSPACE/fram" bash bin/tests/arena-seed-test.sh

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.13

      - name: Install Nix
        uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342 # v31.11.0

      - name: Evaluate exact package identities on every supported system
        working-directory: north
        run: |
          set -euo pipefail
          nix flake check --all-systems --no-build
          for system in x86_64-linux aarch64-linux aarch64-darwin; do
            identity="$(nix eval --json ".#packages.$system.codex" --apply \
              'p: p.northManagedHookFailurePolicy.upstreamIdentity')"
            jq -e '
              .version == "0.144.4" and
              .owner == "openai" and .repo == "codex" and
              .rev == "refs/tags/rust-v0.144.4" and
              .tag == "rust-v0.144.4" and
              .srcHash == "sha256-NmYZxjNFPkRWN4rw+eeka10pJt6/oU3ZoLXBxj3dPRU=" and
              .cargoHash == "sha256-S4dsZXfmKvJItL2XYKyxfhqdCMATEG6oPjrtVRwkuYc=" and
              .patchSha256 == "36e07d12702e31bffb82fbfe577a6f22c81424f1510a78ea3a2add9ca0879bc3"
            ' <<<"$identity"

            public_drv="$(nix eval --raw ".#packages.$system.codex.drvPath")"
            public_name="${public_drv##*/}"
            north_drv="$(nix derivation show ".#packages.$system.north")"
            test "$(jq --arg public "$public_name" \
              '[.derivations[].inputs.drvs | keys[] | select(. == $public)] | length' \
              <<<"$north_drv")" -eq 1
          done

      # Ubuntu's runner image does not ship bubblewrap. Resolve it through
      # North's locked nixpkgs so the full read-only-shell boundary runs instead
      # of being skipped or depending on a mutable host package.
      - name: Resolve SDK Linux sandbox dependency
        working-directory: north
        run: |
          set -euo pipefail
          # Ubuntu 24.04's global AppArmor user-namespace restriction blocks a
          # Nix-store bwrap path. This is an ephemeral single-job VM; disabling
          # that host-level restriction lets the tests exercise North's own
          # mount/network/seccomp sandbox instead of skipping it.
          if [[ -e /proc/sys/kernel/apparmor_restrict_unprivileged_userns ]]; then
            sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          fi
          bwrap="$(nix build --no-link --print-out-paths \
            --inputs-from . nixpkgs#bubblewrap)/bin/bwrap"
          test -x "$bwrap"
          echo "NORTH_BWRAP_BIN=$bwrap" >> "$GITHUB_ENV"

      - name: SDK type, build, and coordination boundaries
        working-directory: north/sdk
        run: |
          set -euo pipefail
          test "$(bun --version)" = 1.3.13
          bun install --frozen-lockfile
          bun run check
          bun run test

      - name: Build locked North Nix package
        working-directory: north
        run: |
          set -euo pipefail
          out="$(nix build --no-link --print-build-logs --print-out-paths \
            'path:.#packages.x86_64-linux.default')"
          test -x "$out/bin/north"
  package-x86_64-linux:
    needs: test
    runs-on: ${{ vars.NORTH_PACKAGE_RUNNER || 'ubuntu-24.04' }}
    timeout-minutes: 240
    concurrency:
      group: north-package-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout North
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          path: north

      # The ephemeral public runner image carries SDKs this repository never
      # uses. Never mutate these system roots on a persistent self-hosted runner.
      - name: Reclaim unused hosted-runner SDK space
        if: ${{ runner.environment == 'github-hosted' }}
        run: |
          set -euo pipefail
          df -h /
          sudo rm -rf \
            /usr/local/lib/android \
            /usr/share/dotnet \
            /opt/ghc \
            /usr/local/.ghcup
          df -h /

      - name: Install Nix
        uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342 # v31.11.0

      - name: Provision deterministic Rust build memory
        env:
          NORTH_RUNNER_ENVIRONMENT: ${{ runner.environment }}
        run: |
          set -euo pipefail
          readonly gib_kib=$((1024 * 1024))
          readonly min_physical_kib=$((15 * gib_kib))
          # A nominal 32 GB runner reports less after GB/GiB conversion and
          # firmware/kernel reservation. Thirty GiB is the class boundary.
          readonly min_self_hosted_physical_kib=$((30 * gib_kib))
          readonly min_total_kib=$((24 * gib_kib))
          readonly min_swap_kib=$((8 * gib_kib))
          readonly max_swap_kib=$((16 * gib_kib))
          readonly build_disk_reserve_kib=$((24 * gib_kib))

          physical_kib="$(awk '/^MemTotal:/ { print $2 }' /proc/meminfo)"
          existing_swap_kib="$(awk '/^SwapTotal:/ { print $2 }' /proc/meminfo)"
          if [[ "$NORTH_RUNNER_ENVIRONMENT" == "self-hosted" ]]; then
            echo "NORTH_CI_SWAP_FILE=" >> "$GITHUB_ENV"
            if (( physical_kib < min_self_hosted_physical_kib )); then
              echo "North's self-hosted package build requires a 32 GB runner class" >&2
              echo "reporting at least 30 GiB physical RAM." >&2
              exit 1
            fi
            available_kib="$(df -Pk /nix | awk 'NR == 2 { print $4 }')"
            if (( available_kib < build_disk_reserve_kib )); then
              echo "North's self-hosted package runner requires a 24 GiB Nix-store disk reserve." >&2
              exit 1
            fi
            printf 'runner=%s physical_kib=%s swap_kib=%s total_kib=%s disk_kib=%s\n' \
              "$NORTH_RUNNER_ENVIRONMENT" "$physical_kib" "$existing_swap_kib" \
              "$((physical_kib + existing_swap_kib))" "$available_kib"
            exit 0
          fi
          if [[ "$NORTH_RUNNER_ENVIRONMENT" != "github-hosted" ]]; then
            echo "Unknown runner environment: $NORTH_RUNNER_ENVIRONMENT" >&2
            exit 1
          fi
          if (( physical_kib < min_physical_kib )); then
            echo "North's exact Codex release build requires at least 15 GiB physical RAM." >&2
            echo "Configure NORTH_PACKAGE_RUNNER with a >=32 GiB runner label." >&2
            exit 1
          fi
          available_kib="$(df -Pk "${RUNNER_TEMP:?}" | awk 'NR == 2 { print $4 }')"
          if (( available_kib < build_disk_reserve_kib )); then
            echo "North's hosted package runner requires a 24 GiB build disk reserve." >&2
            exit 1
          fi

          swap_file=""
          if (( physical_kib + existing_swap_kib < min_total_kib )); then
            required_swap_kib=$((min_total_kib - physical_kib - existing_swap_kib))
            if (( required_swap_kib < min_swap_kib )); then
              swap_kib="$min_swap_kib"
            else
              swap_kib="$required_swap_kib"
            fi
            if (( swap_kib > max_swap_kib )); then
              echo "Required swap exceeds North's 16 GiB CI safety bound." >&2
              echo "Configure NORTH_PACKAGE_RUNNER with a >=32 GiB runner label." >&2
              exit 1
            fi

            swap_file="${RUNNER_TEMP:?}/north-package-${GITHUB_RUN_ID:?}-${GITHUB_RUN_ATTEMPT:?}.swap"
            if (( available_kib < swap_kib + build_disk_reserve_kib )); then
              echo "Insufficient disk for bounded CI swap plus a 24 GiB build reserve." >&2
              echo "Configure NORTH_PACKAGE_RUNNER with a >=32 GiB runner label." >&2
              exit 1
            fi

            echo "NORTH_CI_SWAP_FILE=$swap_file" >> "$GITHUB_ENV"
            sudo fallocate -l "${swap_kib}K" "$swap_file"
            sudo chmod 600 "$swap_file"
            sudo mkswap "$swap_file"
            sudo swapon "$swap_file"
          else
            echo "NORTH_CI_SWAP_FILE=" >> "$GITHUB_ENV"
          fi

          final_swap_kib="$(awk '/^SwapTotal:/ { print $2 }' /proc/meminfo)"
          if (( physical_kib + final_swap_kib < min_total_kib )); then
            echo "North's exact Codex release build requires 24 GiB combined RAM and swap." >&2
            exit 1
          fi
          printf 'physical_kib=%s swap_kib=%s total_kib=%s\n' \
            "$physical_kib" "$final_swap_kib" "$((physical_kib + final_swap_kib))"

      # Codex 0.144.4's release/LTO link reached ~12.3 GiB RSS locally. Keep
      # Cargo/Nix concurrency bounded on a standard runner; repositories with a
      # >=32 GiB runner should set NORTH_PACKAGE_RUNNER to that runner label.
      - name: Build exact patched Codex and packaged North
        working-directory: north
        run: |
          set -euo pipefail
          codex_check="$(nix build --no-link -L --print-out-paths \
            --max-jobs 1 --cores 2 \
            'path:.#checks.x86_64-linux.codex-version')"
          test -e "$codex_check"
          codex_hook_check="$(nix build --no-link -L --print-out-paths \
            --max-jobs 1 --cores 2 \
            'path:.#checks.x86_64-linux.codex-managed-hook-failure')"
          test -e "$codex_hook_check"
          out="$(nix build --no-link -L --print-out-paths \
            --max-jobs 1 --cores 2 \
            'path:.#packages.x86_64-linux.default')"
          test -x "$out/bin/north"

      - name: Remove CI swap
        if: ${{ always() && runner.environment == 'github-hosted' }}
        run: |
          set -euo pipefail
          if [[ -z "${NORTH_CI_SWAP_FILE:-}" ]]; then
            exit 0
          fi
          if awk -v path="$NORTH_CI_SWAP_FILE" \
            'NR > 1 && $1 == path { found = 1 } END { exit !found }' /proc/swaps; then
            sudo swapoff "${NORTH_CI_SWAP_FILE:?}"
          fi
          sudo rm -f "${NORTH_CI_SWAP_FILE:?}"
