name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Lodestar
        uses: actions/checkout@v4
        with:
          path: lodestar

      # Pin the Fram engine to the commit Lodestar's committed out/ was built and
      # tested against (single source of truth: lodestar/FRAM_VERSION). Fram's main
      # moves independently; this keeps its churn from silently breaking us.
      - name: Resolve pinned Fram version
        id: fram
        run: echo "ref=$(grep -v '^#' lodestar/FRAM_VERSION | head -1 | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"
      - name: Checkout Fram engine (pinned)
        uses: actions/checkout@v4
        with:
          repository: tompassarelli/fram
          ref: ${{ steps.fram.outputs.ref }}
          path: fram

      - name: Install babashka
        run: curl -sL https://raw.githubusercontent.com/babashka/babashka/master/install | sudo bash

      - name: Domain tests (run on the committed out/, no Beagle build needed)
        working-directory: lodestar
        run: |
          CP="out:../fram/out"
          bb -cp "$CP" clock_test.clj
          bb -cp "$CP" staleness_test.clj
          # Fram no longer ships a claims.log, so generate one (and exercise the
          # current log format) before the lifecycle test — otherwise it skips.
          ( cd ../fram && bin/fram import )
          FRAM_LOG=../fram/claims.log bb -cp "$CP" cnf_lifecycle_test.clj

      - name: Gateway integration smoke test
        working-directory: lodestar
        run: FRAM_HOME="$GITHUB_WORKSPACE/fram" bash deploy/gateway/smoke_test.sh
