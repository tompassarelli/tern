name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Tern
        uses: actions/checkout@v4
        with:
          path: tern

      # Pin the Fram engine to the commit Tern's committed out/ was built and
      # tested against (single source of truth: tern/FRAM_VERSION). Fram's main
      # moves independently; this keeps its churn from silently breaking us.
      - name: Resolve pinned Fram version
        id: fram
        run: echo "ref=$(grep -v '^#' tern/FRAM_VERSION | head -1 | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"
      - name: Checkout Fram engine (pinned)
        uses: actions/checkout@v4
        with:
          repository: Autonymy/fram
          ref: ${{ steps.fram.outputs.ref }}
          path: fram

      - name: Install babashka
        run: curl -sL https://raw.githubusercontent.com/babashka/babashka/master/install | sudo bash

      # Fram's coordinator daemon (bin/fram-daemon) runs on the JVM via `clojure -M`,
      # NOT babashka — bb's native image lacks javax.net.ssl.SSLServerSocket (engine
      # mTLS). The gateway tests stand up a real coordinator, so the runner needs the
      # Clojure CLI + a JDK (ubuntu-latest ships a JDK; rlwrap isn't needed for `clojure`).
      - name: Install Clojure CLI (Fram's coordinator daemon is JVM, not bb)
        run: |
          curl -L -O https://github.com/clojure/brew-install/releases/latest/download/linux-install.sh
          chmod +x linux-install.sh
          sudo ./linux-install.sh
          clojure --version

      # Pre-download Fram's JVM deps (cheshire) so the daemon boots within the test
      # poll window instead of racing a cold Maven fetch on first launch.
      - name: Warm Fram JVM deps
        working-directory: fram
        run: clojure -P

      - name: Domain tests (run on the committed out/, no Beagle build needed)
        working-directory: tern
        run: |
          CP="out:../fram/out"
          bb -cp "$CP" clock_test.clj
          bb -cp "$CP" staleness_test.clj
          # Fram no longer ships a claims.log, so generate one (and exercise the
          # current log format) before the lifecycle test — otherwise it skips.
          ( cd ../fram && bin/fram import )
          FRAM_LOG=../fram/claims.log bb -cp "$CP" cnf_lifecycle_test.clj

      - name: Gateway integration smoke test
        working-directory: tern
        run: FRAM_HOME="$GITHUB_WORKSPACE/fram" bash deploy/gateway/smoke_test.sh

      - name: Gateway cross-host test (FRAM_BIND=0.0.0.0 + :coordinator-host)
        working-directory: tern
        run: FRAM_HOME="$GITHUB_WORKSPACE/fram" bash deploy/gateway/crosshost_test.sh
