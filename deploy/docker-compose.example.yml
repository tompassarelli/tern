# Example multi-tenant North topology: an authenticated gateway in front of one
# coordinator (+ its own facts.log) per tenant.
#
# ISOLATION MODEL (this is load-bearing — read it):
# The raw coordinator wire protocol is UNAUTHENTICATED; the gateway + bearer token is
# the only auth. So each coordinator must be reachable ONLY by the gateway. We enforce
# that with per-tenant `internal: true` networks: coordinator-acme sits on acme-net,
# coordinator-globex on globex-net, and the gateway joins BOTH (plus an external `edge`
# net for its published port). Result: the gateway can reach each coordinator by service
# name, but the coordinators cannot reach each other and nothing else on the host can
# reach a raw coordinator port. `internal: true` also denies those nets outbound access.
# Do NOT put both coordinators on one shared bridge — that lets a compromised/peer
# container talk to any coordinator with no token (cross-tenant write). For defense in
# depth you can ALSO enable engine mTLS (FRAM_TLS_KEYSTORE/TRUSTSTORE/PASS) so the
# coordinator itself rejects any client without a trusted cert.
#
# The tenant registry (/srv/north/gateway/tenants.edn) gives each tenant a :coordinator-host
# of its service name, e.g.:
#   {"acme"   {:tokens #{"<sha256>"} :coordinator-host "coordinator-acme"
#              :coordinator-port 7801 :coordinator-log "/srv/north/tenant/facts.log"}
#    "globex" {:tokens #{"<sha256>"} :coordinator-host "coordinator-globex"
#              :coordinator-port 7802 :coordinator-log "/srv/north/tenant/facts.log"}}
# The repeated coordinator-log is intentional: it is the canonical path inside
# each isolated coordinator container. The gateway forwards it as protocol data
# and never resolves it in its own mount namespace.
#
# Usage:
#   docker build -t north:latest ..
#   docker compose -f docker-compose.example.yml up -d
#   # Create /srv/north/tenants/{acme,globex} and /srv/north/gateway first.
#   # Keep tenants.edn in /srv/north/gateway; mount the DIRECTORY so atomic
#   # registry renames remain visible to the gateway.

services:
  coordinator-acme:
    image: north:latest
    environment:
      FRAM_BIND: "0.0.0.0"          # reachable by the gateway on acme-net (only)
      FRAM_REQUIRE_LOG_FENCE: "1"   # reject every unfenced coordinator request
      FRAM_PORT: "7801"
      FRAM_LOG: /srv/north/tenant/facts.log
    volumes: ["/srv/north/tenants/acme:/srv/north/tenant"]
    networks: [acme-net]            # isolated: only the gateway also joins acme-net
    restart: unless-stopped         # NOTE: port intentionally NOT published to host

  coordinator-globex:
    image: north:latest
    environment:
      FRAM_BIND: "0.0.0.0"
      FRAM_REQUIRE_LOG_FENCE: "1"
      FRAM_PORT: "7802"
      FRAM_LOG: /srv/north/tenant/facts.log
    volumes: ["/srv/north/tenants/globex:/srv/north/tenant"]
    networks: [globex-net]          # isolated: cannot reach coordinator-acme
    restart: unless-stopped

  gateway:
    image: north:latest
    command: ["bash","-lc","exec bb -cp /opt/north/out /opt/north/deploy/gateway/gateway.clj"]
    environment:
      GATEWAY_PORT: "8088"
      GATEWAY_TENANTS: /srv/north/gateway/tenants.edn
      # Optional SSRF allowlist — restrict where the gateway will forward:
      GATEWAY_ALLOWED_COORD_HOSTS: "coordinator-acme,coordinator-globex"
    ports: ["8088:8088"]            # the ONLY published port (front it with TLS)
    # Read-only directory mount, not a single-file mount: host-side atomic
    # replacement of tenants.edn stays visible without exposing tenant logs.
    volumes: ["/srv/north/gateway:/srv/north/gateway:ro"]
    networks: [edge, acme-net, globex-net]   # bridges the edge to each tenant's net
    depends_on: [coordinator-acme, coordinator-globex]
    restart: unless-stopped

networks:
  edge: {}                          # external-facing (the gateway's published port)
  acme-net:
    internal: true                  # no external connectivity; gateway + acme only
  globex-net:
    internal: true                  # no external connectivity; gateway + globex only
